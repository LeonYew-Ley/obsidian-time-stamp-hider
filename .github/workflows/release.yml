name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate version
        shell: bash
        run: |
          MANIFEST_VERSION="$(node -p "require('./manifest.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME}"
          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "manifest.json version ($MANIFEST_VERSION) must match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Build
        run: npm run build

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" main.js manifest.json --generate-notes
